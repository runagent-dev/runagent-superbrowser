<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New-tab fixture</title>
  <style>
    body { font-family: sans-serif; padding: 40px; }
    a, button { display: block; margin: 16px 0; font-size: 18px; }
  </style>
</head>
<body>
  <h1>New-tab handling fixture</h1>
  <a id="blank-link" href="popup.html" target="_blank">Open popup via target=_blank</a>
  <a id="noopener-link" href="popup.html" target="_blank" rel="noopener">Open popup via target=_blank rel=noopener</a>
  <button id="winopen-btn" onclick="window.open('popup.html')">Open popup via window.open()</button>
  <button id="delayed-btn" onclick="setTimeout(function () { window.open('popup.html?delayed=1'); }, 1500)">Open popup after 1.5s delay</button>
  <p id="marker">Opener page marker text.</p>
</body>
</html>
